# See README.md for architecture, consumer migration, and behaviour.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

# Pass secrets through to worker processes so the Lua code can read them via
# os.getenv at request time. Without this, nginx wipes the worker environment
# on fork and the variables would only be visible inside init_by_lua_block.
env COINGECKO_API_KEY;
# Telegram credentials for the quota monitor — optional. When either is empty
# the monitor still runs and logs, but no alerts are sent.
env TELEGRAM_BOT_TOKEN;
env TELEGRAM_CHAT_ID;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format pricing '$remote_addr "$request" $status '
                       'cache=$sent_http_x_cache_status '
                       'rt=$request_time';
    access_log /dev/stdout pricing;

    sendfile on;
    keepalive_timeout 30;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_shared_dict pricing_cache 50m;
    lua_shared_dict pricing_locks 10m;
    # Holds the last quota probe timestamp + percentage and per-threshold alert
    # dedup state. Tiny — a handful of keys.
    lua_shared_dict monitor_state 1m;

    init_by_lua_block {
        cjson = require "cjson.safe"
        if (os.getenv("COINGECKO_API_KEY") or "") == "" then
            ngx.log(ngx.WARN, "COINGECKO_API_KEY not set — CoinGecko requests will fail")
        end
        if (os.getenv("TELEGRAM_BOT_TOKEN") or "") == "" or
           (os.getenv("TELEGRAM_CHAT_ID")   or "") == "" then
            ngx.log(ngx.WARN,
                "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — quota alerts disabled")
        end
    }

    # Background quota monitor — see monitor.lua. Runs only on worker 0 to
    # avoid duplicate probes/alerts across workers.
    init_worker_by_lua_block {
        require("monitor").start()
    }

    include /etc/nginx/conf.d/*.conf;
}
