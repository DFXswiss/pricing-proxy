# See README.md for architecture, consumer migration, and behaviour.
worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

# Pass COINGECKO_API_KEY through to worker processes so set_by_lua_block can
# read it via os.getenv at request time. Without this, nginx wipes the worker
# environment on fork and the key would only be visible inside init_by_lua_block.
env COINGECKO_API_KEY;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format pricing '$remote_addr "$request" $status '
                       'cache=$sent_http_x_cache_status '
                       'rt=$request_time';
    access_log /dev/stdout pricing;

    sendfile on;
    keepalive_timeout 30;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_shared_dict pricing_cache 50m;
    lua_shared_dict pricing_locks 10m;

    init_by_lua_block {
        cjson = require "cjson.safe"
        if (os.getenv("COINGECKO_API_KEY") or "") == "" then
            ngx.log(ngx.WARN, "COINGECKO_API_KEY not set — CoinGecko requests will fail")
        end
    }

    include /etc/nginx/conf.d/*.conf;
}
