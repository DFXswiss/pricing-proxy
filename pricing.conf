server {
    listen 8080;
    server_name _;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # Debug snapshot of the latest quota probe. No live upstream call — serves
    # whatever the background monitor wrote into the shared dict.
    location = /quota {
        access_log off;
        default_type application/json;
        content_by_lua_block {
            local snap = require("monitor").snapshot() or {}
            ngx.say(cjson.encode(snap))
        }
    }

    # ─── CoinGecko Pro ───────────────────────────────────────────────
    location ^~ /coingecko/ {
        set $proxy_upstream "coingecko";
        content_by_lua_file /etc/nginx/lua/proxy.lua;
    }

    location ^~ /_internal/coingecko/ {
        internal;
        rewrite ^/_internal/coingecko/(.*)$ /$1 break;

        # $cg_key and $upstream are supplied by the caller via
        # ngx.location.capture's `vars` option (see proxy.lua) —
        # set_by_lua_block does not run reliably inside a subrequest's
        # location, and a plain `set $upstream pro-api.coingecko.com;`
        # gets evaluated after proxy_pass picks up the variable, which
        # nginx then reports as "using uninitialized upstream variable".
        #
        # Pinning the upstream behind a variable also forces nginx to use
        # the runtime resolver (which has `ipv6=off`) on every request
        # instead of the boot-time DNS — without it nginx can hand IPv6
        # Cloudflare endpoints to proxy_pass even though the Docker
        # network has no IPv6 outbound, producing
        # `connect() failed (101: Network unreachable)`.
        set $cg_key '';
        set $upstream '';

        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host pro-api.coingecko.com;
        proxy_set_header Accept application/json;
        # Force an identity transfer-encoding so the upstream response body
        # reaches proxy.lua as plain JSON. nginx does not transparently
        # gunzip a proxy_pass response — without this header CoinGecko
        # sends gzip-compressed JSON and `cjson.decode` rejects it as
        # "non-JSON body".
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent "dfx-pricing-proxy/1.0";
        proxy_set_header x-cg-pro-api-key $cg_key;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 8s;
    }

    # ─── Telegram alerting (internal, used by monitor.lua) ───────────
    # Posts JSON to api.telegram.org/bot<TOKEN>/sendMessage. $tg_token is
    # supplied per request via ngx.location.capture's `vars` option so the
    # token never lives in nginx config. access_log is off because the
    # rewritten URL contains the bot token.
    location ^~ /_internal/telegram_send {
        internal;
        access_log off;
        set $tg_token '';
        proxy_method POST;
        proxy_pass https://api.telegram.org/bot$tg_token/sendMessage;
        proxy_ssl_server_name on;
        proxy_set_header Host api.telegram.org;
        proxy_set_header Content-Type application/json;
        proxy_set_header Accept application/json;
        # Same gzip-strip + identity transfer-encoding rationale as the
        # CoinGecko / GeckoTerminal blocks — keeps response bodies plain JSON
        # in case we ever inspect them.
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent "dfx-pricing-proxy/1.0";
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 8s;
    }

    # ─── GeckoTerminal (free tier, no auth) ──────────────────────────
    location ^~ /geckoterminal/ {
        set $proxy_upstream "geckoterminal";
        content_by_lua_file /etc/nginx/lua/proxy.lua;
    }

    location ^~ /_internal/geckoterminal/ {
        internal;
        rewrite ^/_internal/geckoterminal/(.*)$ /$1 break;

        # Same variable-based upstream pattern as the CoinGecko block —
        # forces nginx to resolve via the per-request resolver
        # (`ipv6=off`) instead of boot-time DNS, see the comment above.
        set $upstream '';

        proxy_pass https://$upstream;
        proxy_ssl_server_name on;
        proxy_set_header Host api.geckoterminal.com;
        proxy_set_header Accept application/json;
        # Strip gzip on the upstream call so proxy.lua sees plain JSON —
        # see the CoinGecko block above for the full rationale.
        proxy_set_header Accept-Encoding "";
        proxy_set_header User-Agent "dfx-pricing-proxy/1.0";
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 8s;
    }
}
